name: Terraform

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to run'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0
      
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      
      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"
      
      - name: Terraform Format
        working-directory: ./terraform
        run: terraform fmt -recursive


      
      - name: Terraform Validate
        working-directory: ./terraform
        run: terraform validate
      
      - name: Terraform Plan
        if: github.event_name == 'push' || github.event.inputs.action == 'plan'
        working-directory: ./terraform
        run: |
          terraform plan \
            -var="my_ip=${{ secrets.MY_IP }}" \
            -var="ssh_key_name=${{ secrets.SSH_KEY_NAME }}" \
            -var="qdrant_api_key=${{ secrets.QDRANT_API_KEY }}"
      
      - name: Terraform Apply
        if: github.event_name == 'push' || github.event.inputs.action == 'apply'
        working-directory: ./terraform
        run: |
          terraform apply -auto-approve \
            -var="my_ip=${{ secrets.MY_IP }}" \
            -var="ssh_key_name=${{ secrets.SSH_KEY_NAME }}" \
            -var="qdrant_api_key=${{ secrets.QDRANT_API_KEY }}"
      
      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        working-directory: ./terraform
        run: |
          terraform destroy -auto-approve \
            -var="my_ip=${{ secrets.MY_IP }}" \
            -var="ssh_key_name=${{ secrets.SSH_KEY_NAME }}" \
            -var="qdrant_api_key=${{ secrets.QDRANT_API_KEY }}"
